{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Shop - Pixel Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #000;
        }

        .navbar img {
            height: 50px;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        /* SHOP */
        .container {
            padding: 40px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product {
            background: #222;
            padding: 15px;
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background: #ff4d00;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <img src="{% static 'images/logo.png' %}">

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/shop/">Shop</a>
        <a href="/services/">Services</a>
        <a href="/cart/">Cart 🛒</a>
    </div>
</div>

<!-- SHOP -->
<div class="container">
    <h1>Shop</h1>

    <div class="products">

        {% for product in products %}
        <div class="product">

            <img src="/static/images/{{ product.image }}">

            <h3>{{ product.name }}</h3>
            <p>${{ product.base_price }}</p>

            <a href="/product/{{ product.id }}/">View</a>
        </div>
        {% endfor %}

    </div>
</div>

</html>
