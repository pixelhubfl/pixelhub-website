{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Shop - Pixel Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #000;
        }

        .navbar img {
            height: 50px;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        /* SEARCH */
        .search-form {
            margin-left: 20px;
        }

        .search-input {
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        /* SHOP */
        .container {
            padding: 40px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product {
            background: #222;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            transition: transform 0.2s ease;
        }

        .product:hover {
            transform: scale(1.03);
        }

        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }

        .product a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background: #ff4d00;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        h1 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/">
        <img src="{% static 'images/logo.png' %}">
    </a>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/shop/">Shop</a>
        <a href="/services/">Services</a>
        <a href="/cart/">Cart 🛒</a>

        <!-- 🔥 SEARCH -->
        <form method="GET" action="/shop/" class="search-form">
            <input type="text" name="q" placeholder="Search signs, banners, stickers..." 
                   value="{{ query|default:'' }}" class="search-input">
        </form>
    </div>
</div>

<!-- SHOP -->
<div class="container">
    <h1>Shop</h1>

    <form method="GET" action="/shop/" style="margin-bottom:20px;">
        <input type="text" name="q" placeholder="Search..." value="{{ query|default:'' }}">
        <input type="number" name="min" placeholder="Min Price">
        <input type="number" name="max" placeholder="Max Price">
        <button type="submit">Filter</button>
    </form>

    <div class="products">

        {% for product in products %}
        <div class="product">

            <img src="{% static 'images/' %}{{ product.image }}">

            <h3>{{ product.name }}</h3>
            <p>${{ product.base_price }}</p>

            <a href="/product/{{ product.id }}/">View</a>
        </div>
        {% endfor %}

    </div>
</div>

</html>
