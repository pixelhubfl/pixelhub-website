{% load static %}
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get a Quote</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#000;
position:relative;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
}

.logo img{
height:50px;
}

.menu-icon{
display:none;
font-size:30px;
cursor:pointer;
color:white;
}

.desktop-nav{
display:flex;
gap:20px;
align-items:center;
margin-left:auto;
}

.desktop-nav a{
color:white;
text-decoration:none;
}

.search-input{
padding:10px;
border:none;
border-radius:20px;
box-sizing:border-box;
}

.mobile-menu{
display:none;
flex-direction:column;
background:#000;
padding:20px;
border-top:1px solid #222;
}

.mobile-menu a{
padding:10px 0;
color:white;
text-decoration:none;
}

/* FORM CONTAINER */
.container{
max-width:800px;
margin:60px auto;
background:#1a1a1a;
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.container h1{
margin-bottom:30px;
font-size:36px;
text-align:center;
}

/* FORM */
input,textarea,select{
width:100%;
padding:15px;
margin-bottom:20px;
border:none;
border-radius:12px;
box-sizing:border-box;
font-size:16px;
background:#2a2a2a;
color:white;
}

textarea{
min-height:150px;
resize:vertical;
}

button{
width:100%;
padding:16px;
background:#ff4d00;
border:none;
color:white;
font-size:18px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff6a33;
}

/* MOBILE */
@media (max-width:768px){

.menu-icon{
display:block;
}

.desktop-nav{
display:none;
}

.container{
margin:25px;
padding:25px;
}

.container h1{
font-size:28px;
}

}

</style>

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="logo">
<a href="/">
<img src="{% static 'images/logo.png' %}">
</a>
</div>

<div class="desktop-nav">
<a href="/">Home</a>
<a href="/shop/">Shop</a>
<a href="/services/">Services</a>
<a href="/cart/">Cart 🛒</a>

<form method="GET" action="/shop/">
<input type="text" name="q" placeholder="Search..." class="search-input">
</form>
</div>

</div>

<div class="mobile-menu" id="mobileMenu">

<form method="GET" action="/shop/" style="margin-bottom:15px;">
<input type="text" name="q" placeholder="Search..." class="search-input" style="width:100%;">
</form>

<a href="/">Home</a>
<a href="/shop/">Shop</a>
<a href="/services/">Services</a>
<a href="/cart/">Cart 🛒</a>

</div>

<!-- FORM -->
<div class="container">

<h1>Request a Quote</h1>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="phone" placeholder="Phone Number">

<select name="service">
<option>Car Wrap</option>
<option>Truck Wrap</option>
<option>Boat Wrap</option>
<option>Food Truck Wrap</option>
</select>

<textarea name="details" placeholder="Describe your project"></textarea>

<input type="file" name="files" multiple>

<button type="submit">Send Request</button>

</form>

</div>

<!-- CHAT -->
<script type="text/javascript">
var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
(function(){
var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
s1.async=true;
s1.src='https://embed.tawk.to/69d9486fe0ef771c36227e10/1jlsc5t9e';
s1.charset='UTF-8';
s1.setAttribute('crossorigin','*');

})();

<script>

function toggleMenu(){

let menu=document.getElementById("mobileMenu");

if(menu.style.display==="flex"){
menu.style.display="none";
}else{
menu.style.display="flex";
}

}

</script>

</body>
</html>
