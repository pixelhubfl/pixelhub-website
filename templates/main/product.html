{% load static %}
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ product.name }}</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
padding-top:80px; /* 🔥 evita que navbar tape contenido */
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:flex-start; /* 🔥 menu a la izquierda */
align-items:center;
padding:15px 25px;
background:#000;
position:fixed; /* 🔥 ahora es fijo */
top:0;
left:0;
width:100%;
z-index:1000;
}

.logo{
position:absolute;
left:50%;
transform:translateX(-50%);
}

.logo img{
height:50px;
}

.menu-icon{
display:none;
font-size:30px;
cursor:pointer;
color:white;
}

.desktop-nav{
display:flex;
gap:20px;
align-items:center;
}

.desktop-nav a{
color:white;
text-decoration:none;
}

.search-input{
padding:10px;
border:none;
border-radius:20px;
box-sizing:border-box;
}

.mobile-menu{
display:none;
flex-direction:column;
background:#000;
padding:20px;
border-top:1px solid #222;
position:fixed;
top:80px;
left:0;
width:100%;
z-index:999;
}

.mobile-menu a{
padding:10px 0;
color:white;
text-decoration:none;
}

/* PRODUCT */
.container{
display:flex;
gap:50px;
padding:50px;
max-width:1400px;
margin:auto;
}

.product-gallery{
flex:1;
}

.product-gallery img{
width:100%;
border-radius:15px;
}

.details{
flex:1;
background:#1a1a1a;
padding:30px;
border-radius:15px;
}

.price{
font-size:30px;
font-weight:bold;
color:#ff4d00;
margin:15px 0;
}

.description{
color:#ccc;
line-height:1.6;
margin-bottom:25px;
}

.option-group{
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:14px;
border:none;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

textarea{
min-height:120px;
}

.checkbox{
display:flex;
gap:10px;
align-items:center;
}

.checkbox input{
width:auto;
}

.btn{
width:100%;
padding:18px;
background:#ff4d00;
border:none;
color:white;
font-size:18px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

/* LIVE PRICE */
.live-price{
margin-top:20px;
background:#222;
padding:20px;
border-radius:12px;
}

.live-price p{
margin:5px 0;
color:#ccc;
}

.live-price .total{
font-size:22px;
color:#ff4d00;
font-weight:bold;
margin-top:10px;
}

/* CONTACT */
.contact{
padding:60px 20px;
text-align:center;
background:#000;
}

.contact h2{
font-size:36px;
margin-bottom:20px;
}

.contact p{
font-size:18px;
color:#ccc;
margin:10px 0;
}

/* FOOTER */
.footer{
background:#0a0a0a;
padding:60px 30px 30px;
}

.footer-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
max-width:1200px;
margin:auto;
}

.footer-column h3{
margin-bottom:20px;
color:#ff4d00;
}

.footer-column p,
.footer-column a{
color:#ccc;
text-decoration:none;
line-height:1.8;
display:block;
}

.footer-column a:hover{
color:#ff4d00;
}

.payment-icons{
font-size:30px;
margin-top:15px;
}

.copyright{
margin-top:40px;
text-align:center;
padding-top:20px;
border-top:1px solid #222;
color:#777;
}

/* MOBILE (incluye horizontal 🔥) */
@media (max-width:900px){

.menu-icon{
display:block;
}

.desktop-nav{
display:none;
}

.container{
flex-direction:column;
padding:0;
gap:0;
}

.product-gallery img{
border-radius:0;
}

.details{
border-radius:0;
padding:25px;
}

.footer-grid{
grid-template-columns:1fr;
text-align:center;
}

}

</style>

</head>
<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="menu-icon" onclick="toggleMenu()">☰</div>

<div class="desktop-nav">
<a href="/">Home</a>
<a href="/shop/">Shop</a>
<a href="/services/">Services</a>
<a href="/design-services/">Design Services</a>
<a href="/cart/">Cart 🛒</a>

<form method="GET" action="/shop/">
<input type="text" name="q" placeholder="Search..." class="search-input">
</form>
</div>

<div class="logo">
<a href="/">
<img src="{% static 'images/logo.png' %}">
</a>
</div>

</div>

<div class="mobile-menu" id="mobileMenu">

<form method="GET" action="/shop/" style="margin-bottom:15px;">
<input type="text" name="q" placeholder="Search..." class="search-input" style="width:100%;">
</form>

<a href="/">Home</a>
<a href="/shop/">Shop</a>
<a href="/services/">Services</a>
<a href="/design-services/">Design Services</a>
<a href="/cart/">Cart 🛒</a>

</div>

<!-- RESTO IGUAL (NO CAMBIÉ NADA MÁS) -->
