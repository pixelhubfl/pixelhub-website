{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #000;
        }

        .navbar img {
            height: 50px;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        /* LAYOUT */
        .container {
            display: flex;
            gap: 40px;
            padding: 50px;
        }

        .image img {
            width: 500px;
            border-radius: 10px;
        }

        .details {
            max-width: 400px;
        }

        .details h1 {
            margin-bottom: 10px;
        }

        .details p {
            font-size: 18px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            background: #ff4d00;
            border: none;
            color: white;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <img src="{% static 'images/logo.png' %}">

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/shop/">Shop</a>
        <a href="/services/">Services</a>
        <a href="/cart/">Cart 🛒</a>
    </div>
</div>

<!-- PRODUCT -->
<div class="container">

    <div class="image">
        <img src="/static/images/{{ product.image }}">
    </div>

    <div class="details">
        <h1>{{ product.name }}</h1>
        <p><strong>Price:</strong> ${{ product.base_price }}</p>

        <form method="POST" action="/add-to-cart/{{ product.id }}/" enctype="multipart/form-data">
            {% csrf_token %}

            {% if product.is_custom_size %}
                <input type="text" name="width" placeholder="Width (ft)">
                <input type="text" name="height" placeholder="Height (ft)">
            {% endif %}

            <label>Quantity:</label>
            <input type="number" name="quantity" value="1" min="1">

            <input type="file" name="file">
            <textarea name="notes" placeholder="Additional notes..."></textarea>

            <button type="submit">Add to Cart</button>
        </form>
    </div>

</div>

</body>
</html>
